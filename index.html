<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/style.css" />
    <title>Base Apparel coming soon page</title>
  </head>
  <body>
    <header>
      <nav class="logo-container">
        <div class="logo-image-container">
          <img
            class="logo-image"
            src="images/logo.svg"
            alt="Site logo that reads, base apparel."
          />
        </div>
      </nav>
      <div class="hero-image-container">
        <img
          class="hero-image"
          src="images/hero-mobile.jpg"
          alt="Image of a young woman."
        />
      </div>
    </header>
    <main>
      <section class="article-form-container">
        <article class="article">
          <div class="article-heading-container">
            <h1><span>WE'RE</span> COMING SOON</h1>
          </div>
          <div class="article-paragraph-container">
            <p>
              Hello fellow shoppers! We're currently building our new fashion
              store. Add your email below to stay up-to-date with announcements
              and our launch deals.
            </p>
          </div>
        </article>
        <form>
          <input type="email" placeholder="Email Address" />
          <button type="submit">
            <img
              src="images/icon-arrow.svg"
              alt="Arrow right icon on submit button"
            />
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
